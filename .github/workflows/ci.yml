name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # manual trigger

env:
  COMPOSE_FILE: infrastructure/docker-compose.yml
  COMPOSE_FILE_CI: infrastructure/docker-compose.yml -f infrastructure/docker-compose.dev.yml
  PYTHON_VERSION: "3.12"

jobs:
  # ────────────────────────────────────────────────────────────────
  # Lint
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: ruff (linter)
        run: ruff check app/ tests/

      - name: ruff (formatter check)
        run: ruff format --check app/ tests/

      - name: mypy (type check)
        run: mypy app/ --ignore-missing-imports || true
        # mypy strict mode may fail on some deps; treat as advisory for now

  # ────────────────────────────────────────────────────────────────
  # Test
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest in Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env placeholder (CI)
        run: |
          cat > infrastructure/.env <<'EOF'
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL=${{ vars.LLM_BASE_URL || 'https://api.deepseek.com' }}
          LLM_MODEL=${{ vars.LLM_MODEL || 'deepseek-chat' }}
          JWT_SECRET_KEY=ci-test-jwt-secret-not-for-production
          CRM_ADAPTER=mock
          CRM_SYNC_FREQUENCY=manual
          CRM_RAG_BRIDGE=false
          EOF

      - name: Build containers
        run: docker compose -f $COMPOSE_FILE_CI build

      - name: Start services
        run: docker compose -f $COMPOSE_FILE_CI up -d

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health/live; then
              echo "Backend healthy"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
          curl -f http://localhost:8000/health/ready || echo "Warning: readiness check failed (expected in CI without full infra)"

      - name: Run tests
        run: |
          docker compose -f $COMPOSE_FILE_CI exec -T backend pytest -v --tb=short --ignore=tests/test_langgraph_pipeline.py

      - name: Docker logs (on failure)
        if: failure()
        run: |
          docker compose -f $COMPOSE_FILE_CI logs --tail=200

      - name: Cleanup
        if: always()
        run: docker compose -f $COMPOSE_FILE_CI down -v

  # ────────────────────────────────────────────────────────────────
  # Build & Push Docker Images
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rag-crm-backend
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set backend package visibility to public
        run: |
          gh api --method PATCH /user/packages/container/rag-crm-backend/visibility \
            -f visibility=public \
            --silent 2>/dev/null || echo "Package already public or needs different scope"

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rag-crm-frontend
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./backend/frontend
          file: ./backend/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set frontend package visibility to public
        run: |
          gh api --method PATCH /user/packages/container/rag-crm-frontend/visibility \
            -f visibility=public \
            --silent 2>/dev/null || echo "Package already public or needs different scope"

  # ────────────────────────────────────────────────────────────────
  # Deploy (placeholder — customize for your target)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Deploy trigger
        run: |
          echo "Deploy triggered for commit ${{ github.sha }}"
          echo "Images:"
          echo "  Backend:  ghcr.io/${{ github.repository_owner }}/rag-crm-backend:${{ github.sha }}"
          echo "  Frontend: ghcr.io/${{ github.repository_owner }}/rag-crm-frontend:${{ github.sha }}"
          echo ""
          echo "To deploy on your server:"
          echo "  1. Pull images: docker pull ghcr.io/${{ github.repository_owner }}/rag-crm-backend:latest"
          echo "  2. Update docker-compose.yml to use ghcr.io images"
          echo "  3. docker compose -f infrastructure/docker-compose.yml -f infrastructure/docker-compose.prod.yml up -d"
          echo ""
          echo "Add SSH/webhook deploy steps here for your target environment."

      # ── Example: Deploy via SSH ────────────────────────────────
      # Uncomment and configure for your server:
      #
      # - uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     script: |
      #       cd /opt/rag-crm
      #       git pull origin master
      #       docker compose -f infrastructure/docker-compose.yml -f infrastructure/docker-compose.prod.yml pull
      #       docker compose -f infrastructure/docker-compose.yml -f infrastructure/docker-compose.prod.yml up -d --remove-orphans
