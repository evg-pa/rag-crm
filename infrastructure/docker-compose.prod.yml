# ───────────────────────────────────────────────────────────────────────
# Production override — nginx reverse proxy with HTTPS (Let's Encrypt)
#
# Usage:
#   1. Set DOMAIN + CERTBOT_EMAIL in infrastructure/.env:
#        DOMAIN=rag-crm.example.com
#        CERTBOT_EMAIL=admin@example.com
#   2. Run: ./init-letsencrypt.sh               (first-time cert bootstrap)
#   3. Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this override does:
#   - Removes public ports from backend/frontend (internal-only, via nginx)
#   - Adds nginx on :80/:443 with HTTP→HTTPS redirect + WebSocket support
#   - Adds certbot for automatic Let's Encrypt renewal (every 12h)
#   - nginx reloads every 6h to pick up renewed certificates
# ───────────────────────────────────────────────────────────────────────

services:
  # ── Backend: remove host port — reachable only through nginx ──────
  backend:
    ports: !override []

  # ── Frontend: remove host port — reachable only through nginx ─────
  frontend:
    ports: !override []

  # ── nginx reverse proxy with HTTPS termination ────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: rag-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/app.conf:/etc/nginx/conf.d/app.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    command: >
      /bin/sh -c "
        while :; do
          sleep 6h & wait $$!;
          nginx -s reload;
        done &
        exec nginx -g 'daemon off;'
      "
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── certbot — Let's Encrypt automatic renewal ─────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: rag-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $$!;
        done
      "
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN must be set in infrastructure/.env}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:?CERTBOT_EMAIL must be set in infrastructure/.env}
    depends_on:
      nginx:
        condition: service_started

networks:
  default:
    driver: bridge
