# Production override — adds HTTPS reverse proxy (nginx) + Let's Encrypt auto-renewal
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# For initial SSL certificate setup, run:
#   ./init-letsencrypt.sh
#
# Requires DOMAIN and CERTBOT_EMAIL set in infrastructure/.env:
#   DOMAIN=rag-crm.example.com
#   CERTBOT_EMAIL=admin@example.com

services:
  # ────────────────────────────────────────────────────────────
  # Override backend: remove host port — internal-only via nginx
  # ────────────────────────────────────────────────────────────
  backend:
    ports: []

  # ────────────────────────────────────────────────────────────
  # Override frontend: remove host port — internal-only via nginx
  # ────────────────────────────────────────────────────────────
  frontend:
    ports: []

  # ────────────────────────────────────────────────────────────
  # nginx reverse proxy with HTTPS termination
  # ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: rag-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN must be set in .env}
    command: >
      /bin/sh -c "
        envsubst '\$\${DOMAIN}' < /etc/nginx/conf.d/app.conf.template > /etc/nginx/conf.d/app.conf &&
        while :; do
          sleep 6h & wait \$\${!};
          nginx -s reload;
        done &
        exec nginx -g 'daemon off;'
      "
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ────────────────────────────────────────────────────────────
  # certbot — Let's Encrypt certificate auto-renewal
  # ────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: rag-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait \$\${!};
        done
      "
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN must be set in .env}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:?CERTBOT_EMAIL must be set in .env}
    depends_on:
      nginx:
        condition: service_started
    healthcheck:
      test: ["CMD", "test", "-d", "/etc/letsencrypt/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    driver: bridge
