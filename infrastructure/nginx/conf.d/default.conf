# RAG-CRM site configuration
# Placeholder domain: replace YOUR_DOMAIN with actual domain
# Certificate paths assume Let's Encrypt (certbot)

server {
    listen 80;
    server_name _;

    # ── Let's Encrypt ACME challenge ─────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Redirect everything else to HTTPS (once certs are in place) ──
    # Uncomment after initial certificate bootstrap:
    # return 301 https://$host$request_uri;
    #

    # ── Fallback: proxy everything to backend/frontend for dev ───
    # Remove this block after enabling HTTPS redirect above
    include /etc/nginx/conf.d/routes.conf;
}

