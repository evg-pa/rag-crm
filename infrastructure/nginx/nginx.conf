# Nginx reverse proxy for RAG-CRM
# Proxies: /api/* → backend:8000, / → frontend:8501

worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker's embedded DNS (deferred resolution for upstreams)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ─────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;  # document uploads

    # ── Security ────────────────────────────────────────────────
    server_tokens off;

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # ── Rate Limiting (zone shared across workers) ──────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

    # ── Upstreams (deferred resolution via Docker DNS) ──────────
    upstream backend {
        zone backend 64k;
        server backend:8000 resolve;
        keepalive 32;
    }

    upstream frontend {
        zone frontend 64k;
        server frontend:8501 resolve;
        keepalive 32;
    }

    # ── Include site configs ────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
